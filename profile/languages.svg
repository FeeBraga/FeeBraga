<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161B22;stop-opacity:1" />
    </linearGradient>

    <!-- Shine Effect Gradient -->
    <linearGradient id="shineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#FFFFFF;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Grid Pattern -->
    <pattern id="gridPattern" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#30363D" stroke-width="0.5" opacity="0.05" />
    </pattern>

    <!-- Clip Path for Shine Animation -->
    <clipPath id="barClip">
      <rect x="0" y="0" width="800" height="30" rx="4" />
    </clipPath>
  </defs>

  <!-- Main Background -->
  <rect width="1200" height="500" fill="url(#bgGradient)" />
  <rect width="1200" height="500" fill="url(#gridPattern)" opacity="0.5" />

  <!-- Title -->
  <text x="60" y="50" font-family="'Segoe UI', system-ui, sans-serif" font-size="24" font-weight="600" fill="#F0F6FC">
    <animate attributeName="opacity" values="0;1" dur="1s" fill="freeze" />
    Top Languages
  </text>
  <line x1="60" y1="65" x2="200" y2="65" stroke="#58A6FF" stroke-width="2" opacity="0.5">
    <animate attributeName="opacity" values="0;0.5" dur="1.5s" fill="freeze" />
  </line>

  <!-- Language 1: Python -->
  <g transform="translate(60, 100)">
    <!-- Language Icon -->
    <g transform="translate(0, 0)">
      <rect width="40" height="40" rx="8" fill="#3572A5" opacity="0.2">
        <animate attributeName="opacity" values="0;0.2" dur="1.5s" fill="freeze" />
      </rect>
      <text x="20" y="26" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" font-weight="700" fill="#3572A5">
        <animate attributeName="opacity" values="0;1" dur="1.8s" fill="freeze" />
        Py
      </text>
    </g>
    
    <!-- Language Name -->
    <text x="60" y="25" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" font-weight="600" fill="#F0F6FC">
      <animate attributeName="opacity" values="0;1" dur="1.5s" fill="freeze" />
      Python
    </text>
    
    <!-- Percentage -->
    <text x="1100" y="25" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" font-weight="600" fill="#8B949E">
      <animate attributeName="opacity" values="0;1" dur="2.0s" fill="freeze" />
      33.4%
    </text>
    
    <!-- Background Bar -->
    <rect x="60" y="35" width="1040" height="12" rx="6" fill="#30363D" opacity="0.3">
      <animate attributeName="opacity" values="0;0.3" dur="1.5s" fill="freeze" />
    </rect>
    
    <!-- Progress Bar -->
    <rect x="60" y="35" width="0" height="12" rx="6" fill="#3572A5" filter="url(#glow)">
      <animate attributeName="width" values="0;346" dur="2s" fill="freeze" begin="0.5s" />
    </rect>
    
    <!-- Shine Effect -->
    <rect x="60" y="35" width="1040" height="12" rx="6" fill="url(#shineGradient)" clip-path="url(#barClip)" opacity="0.5">
      <animate attributeName="x" values="-1040;1040" dur="8s" repeatCount="indefinite" begin="2.0s" />
    </rect>
  </g>
  <!-- Language 2: CSS -->
  <g transform="translate(60, 160)">
    <!-- Language Icon -->
    <g transform="translate(0, 0)">
      <rect width="40" height="40" rx="8" fill="#563D7C" opacity="0.2">
        <animate attributeName="opacity" values="0;0.2" dur="1.8s" fill="freeze" />
      </rect>
      <text x="20" y="26" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" font-weight="700" fill="#563D7C">
        <animate attributeName="opacity" values="0;1" dur="2.1s" fill="freeze" />
        CS
      </text>
    </g>
    
    <!-- Language Name -->
    <text x="60" y="25" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" font-weight="600" fill="#F0F6FC">
      <animate attributeName="opacity" values="0;1" dur="1.8s" fill="freeze" />
      CSS
    </text>
    
    <!-- Percentage -->
    <text x="1100" y="25" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" font-weight="600" fill="#8B949E">
      <animate attributeName="opacity" values="0;1" dur="2.3s" fill="freeze" />
      27.7%
    </text>
    
    <!-- Background Bar -->
    <rect x="60" y="35" width="1040" height="12" rx="6" fill="#30363D" opacity="0.3">
      <animate attributeName="opacity" values="0;0.3" dur="1.8s" fill="freeze" />
    </rect>
    
    <!-- Progress Bar -->
    <rect x="60" y="35" width="0" height="12" rx="6" fill="#563D7C" filter="url(#glow)">
      <animate attributeName="width" values="0;287" dur="2s" fill="freeze" begin="0.8s" />
    </rect>
    
    <!-- Shine Effect -->
    <rect x="60" y="35" width="1040" height="12" rx="6" fill="url(#shineGradient)" clip-path="url(#barClip)" opacity="0.5">
      <animate attributeName="x" values="-1040;1040" dur="9s" repeatCount="indefinite" begin="2.5s" />
    </rect>
  </g>
  <!-- Language 3: JavaScript -->
  <g transform="translate(60, 220)">
    <!-- Language Icon -->
    <g transform="translate(0, 0)">
      <rect width="40" height="40" rx="8" fill="#F1E05A" opacity="0.2">
        <animate attributeName="opacity" values="0;0.2" dur="2.1s" fill="freeze" />
      </rect>
      <text x="20" y="26" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" font-weight="700" fill="#F1E05A">
        <animate attributeName="opacity" values="0;1" dur="2.4s" fill="freeze" />
        JS
      </text>
    </g>
    
    <!-- Language Name -->
    <text x="60" y="25" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" font-weight="600" fill="#F0F6FC">
      <animate attributeName="opacity" values="0;1" dur="2.1s" fill="freeze" />
      JavaScript
    </text>
    
    <!-- Percentage -->
    <text x="1100" y="25" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" font-weight="600" fill="#8B949E">
      <animate attributeName="opacity" values="0;1" dur="2.6s" fill="freeze" />
      17.7%
    </text>
    
    <!-- Background Bar -->
    <rect x="60" y="35" width="1040" height="12" rx="6" fill="#30363D" opacity="0.3">
      <animate attributeName="opacity" values="0;0.3" dur="2.1s" fill="freeze" />
    </rect>
    
    <!-- Progress Bar -->
    <rect x="60" y="35" width="0" height="12" rx="6" fill="#F1E05A" filter="url(#glow)">
      <animate attributeName="width" values="0;183" dur="2s" fill="freeze" begin="1.1s" />
    </rect>
    
    <!-- Shine Effect -->
    <rect x="60" y="35" width="1040" height="12" rx="6" fill="url(#shineGradient)" clip-path="url(#barClip)" opacity="0.5">
      <animate attributeName="x" values="-1040;1040" dur="10s" repeatCount="indefinite" begin="3.0s" />
    </rect>
  </g>
  <!-- Language 4: HTML -->
  <g transform="translate(60, 280)">
    <!-- Language Icon -->
    <g transform="translate(0, 0)">
      <rect width="40" height="40" rx="8" fill="#E34C26" opacity="0.2">
        <animate attributeName="opacity" values="0;0.2" dur="2.4s" fill="freeze" />
      </rect>
      <text x="20" y="26" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" font-weight="700" fill="#E34C26">
        <animate attributeName="opacity" values="0;1" dur="2.7s" fill="freeze" />
        H5
      </text>
    </g>
    
    <!-- Language Name -->
    <text x="60" y="25" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" font-weight="600" fill="#F0F6FC">
      <animate attributeName="opacity" values="0;1" dur="2.4s" fill="freeze" />
      HTML
    </text>
    
    <!-- Percentage -->
    <text x="1100" y="25" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" font-weight="600" fill="#8B949E">
      <animate attributeName="opacity" values="0;1" dur="2.9s" fill="freeze" />
      12.2%
    </text>
    
    <!-- Background Bar -->
    <rect x="60" y="35" width="1040" height="12" rx="6" fill="#30363D" opacity="0.3">
      <animate attributeName="opacity" values="0;0.3" dur="2.4s" fill="freeze" />
    </rect>
    
    <!-- Progress Bar -->
    <rect x="60" y="35" width="0" height="12" rx="6" fill="#E34C26" filter="url(#glow)">
      <animate attributeName="width" values="0;126" dur="2s" fill="freeze" begin="1.4s" />
    </rect>
    
    <!-- Shine Effect -->
    <rect x="60" y="35" width="1040" height="12" rx="6" fill="url(#shineGradient)" clip-path="url(#barClip)" opacity="0.5">
      <animate attributeName="x" values="-1040;1040" dur="11s" repeatCount="indefinite" begin="3.5s" />
    </rect>
  </g>
  <!-- Language 5: C# -->
  <g transform="translate(60, 340)">
    <!-- Language Icon -->
    <g transform="translate(0, 0)">
      <rect width="40" height="40" rx="8" fill="#239120" opacity="0.2">
        <animate attributeName="opacity" values="0;0.2" dur="2.7s" fill="freeze" />
      </rect>
      <text x="20" y="26" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" font-weight="700" fill="#239120">
        <animate attributeName="opacity" values="0;1" dur="3.0s" fill="freeze" />
        C#
      </text>
    </g>
    
    <!-- Language Name -->
    <text x="60" y="25" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" font-weight="600" fill="#F0F6FC">
      <animate attributeName="opacity" values="0;1" dur="2.7s" fill="freeze" />
      C#
    </text>
    
    <!-- Percentage -->
    <text x="1100" y="25" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" font-weight="600" fill="#8B949E">
      <animate attributeName="opacity" values="0;1" dur="3.2s" fill="freeze" />
      4.6%
    </text>
    
    <!-- Background Bar -->
    <rect x="60" y="35" width="1040" height="12" rx="6" fill="#30363D" opacity="0.3">
      <animate attributeName="opacity" values="0;0.3" dur="2.7s" fill="freeze" />
    </rect>
    
    <!-- Progress Bar -->
    <rect x="60" y="35" width="0" height="12" rx="6" fill="#239120" filter="url(#glow)">
      <animate attributeName="width" values="0;48" dur="2s" fill="freeze" begin="1.7s" />
    </rect>
    
    <!-- Shine Effect -->
    <rect x="60" y="35" width="1040" height="12" rx="6" fill="url(#shineGradient)" clip-path="url(#barClip)" opacity="0.5">
      <animate attributeName="x" values="-1040;1040" dur="12s" repeatCount="indefinite" begin="4.0s" />
    </rect>
  </g>
  <!-- Language 6: TypeScript -->
  <g transform="translate(60, 400)">
    <!-- Language Icon -->
    <g transform="translate(0, 0)">
      <rect width="40" height="40" rx="8" fill="#3178C6" opacity="0.2">
        <animate attributeName="opacity" values="0;0.2" dur="3.0s" fill="freeze" />
      </rect>
      <text x="20" y="26" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" font-weight="700" fill="#3178C6">
        <animate attributeName="opacity" values="0;1" dur="3.3s" fill="freeze" />
        TS
      </text>
    </g>
    
    <!-- Language Name -->
    <text x="60" y="25" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" font-weight="600" fill="#F0F6FC">
      <animate attributeName="opacity" values="0;1" dur="3.0s" fill="freeze" />
      TypeScript
    </text>
    
    <!-- Percentage -->
    <text x="1100" y="25" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" font-weight="600" fill="#8B949E">
      <animate attributeName="opacity" values="0;1" dur="3.5s" fill="freeze" />
      4.5%
    </text>
    
    <!-- Background Bar -->
    <rect x="60" y="35" width="1040" height="12" rx="6" fill="#30363D" opacity="0.3">
      <animate attributeName="opacity" values="0;0.3" dur="3.0s" fill="freeze" />
    </rect>
    
    <!-- Progress Bar -->
    <rect x="60" y="35" width="0" height="12" rx="6" fill="#3178C6" filter="url(#glow)">
      <animate attributeName="width" values="0;46" dur="2s" fill="freeze" begin="2.0s" />
    </rect>
    
    <!-- Shine Effect -->
    <rect x="60" y="35" width="1040" height="12" rx="6" fill="url(#shineGradient)" clip-path="url(#barClip)" opacity="0.5">
      <animate attributeName="x" values="-1040;1040" dur="13s" repeatCount="indefinite" begin="4.5s" />
    </rect>
  </g>

  <!-- Decorative Elements -->
  <g opacity="0.1">
    <circle cx="1150" cy="50" r="2" fill="#58A6FF">
      <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite" />
    </circle>
    <circle cx="1170" cy="70" r="1.5" fill="#58A6FF">
      <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite" />
    </circle>
    <circle cx="1130" cy="80" r="1" fill="#58A6FF">
      <animate attributeName="opacity" values="0;1;0" dur="5s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Bottom Line -->
  <line x1="60" y1="470" x2="1140" y2="470" stroke="#30363D" stroke-width="1" opacity="0.3">
    <animate attributeName="opacity" values="0;0.3" dur="4s" fill="freeze" />
  </line>
</svg>