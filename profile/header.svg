<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" role="img" aria-labelledby="title desc">
  <title id="title">Felipe Braga</title>
  <desc id="desc">Cabeçalho minimalista do portfólio no GitHub.</desc>

  <defs>
    <linearGradient id="panelFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161B22" />
      <stop offset="100%" stop-color="#0D1117" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58A6FF" />
      <stop offset="100%" stop-color="#79C0FF" />
    </linearGradient>
    <style>
      text { font-family: 'Segoe UI', Inter, system-ui, sans-serif; }
      .title { fill: #F0F6FC; font-size: 24px; font-weight: 600; text-anchor: middle; }
      .label { fill: #F0F6FC; font-size: 18px; font-weight: 600; }
      .value { fill: #8B949E; font-size: 18px; font-weight: 600; text-anchor: end; }
      .pill-text { fill: #79C0FF; font-size: 14px; font-weight: 700; text-anchor: middle; dominant-baseline: middle; }
      .eyebrow { fill: #79C0FF; font-size: 14px; font-weight: 700; text-anchor: middle; letter-spacing: 1.2px; }
      .headline { fill: #F0F6FC; font-size: 54px; font-weight: 700; text-anchor: middle; }
      .subtitle { fill: #8B949E; font-size: 20px; font-weight: 500; text-anchor: middle; }
      .body { fill: #8B949E; font-size: 16px; font-weight: 400; text-anchor: middle; }
      .chip-text { fill: #F0F6FC; font-size: 15px; font-weight: 600; text-anchor: middle; dominant-baseline: middle; }
    </style>
    
  </defs>

  <rect width="1200" height="320" rx="28" fill="#0D1117" />
  <rect x="14" y="14" width="1172" height="292" rx="26" fill="url(#panelFill)" stroke="#30363D" stroke-width="2" />
  <rect x="34" y="34" width="1132" height="252" rx="22" fill="none" stroke="#21262D" stroke-width="1" />
  <g opacity="0.55">
    <line x1="94" y1="88" x2="286" y2="88" stroke="#30363D" stroke-width="1" />
    <line x1="914" y1="88" x2="1106" y2="88" stroke="#30363D" stroke-width="1" />
    <line x1="94" y1="232" x2="286" y2="232" stroke="#30363D" stroke-width="1" />
    <line x1="914" y1="232" x2="1106" y2="232" stroke="#30363D" stroke-width="1" />
  </g>
  <text x="600" y="86" class="eyebrow">GITHUB PROFILE</text>
  <text x="600" y="146" class="headline">Felipe Braga</text>
  <line x1="500" y1="164" x2="700" y2="164" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" opacity="0.9" />
  <text x="600" y="196" class="subtitle">Desenvolvedor Full Stack</text>
  <text x="600" y="224" class="body">Interfaces limpas, APIs robustas e foco em produto.</text>
  
  <g transform="translate(420 238)">
    <rect x="-88" y="-18" width="176" height="36" rx="18" fill="#0D1117" stroke="#21262D" stroke-width="1.5" />
    <text x="0" y="2" class="chip-text">Python &amp; .NET</text>
  </g>
  <g transform="translate(600 238)">
    <rect x="-88" y="-18" width="176" height="36" rx="18" fill="#0D1117" stroke="#21262D" stroke-width="1.5" />
    <text x="0" y="2" class="chip-text">React &amp; TypeScript</text>
  </g>
  <g transform="translate(780 238)">
    <rect x="-88" y="-18" width="176" height="36" rx="18" fill="#0D1117" stroke="#21262D" stroke-width="1.5" />
    <text x="0" y="2" class="chip-text">Arquitetura e UX</text>
  </g>

