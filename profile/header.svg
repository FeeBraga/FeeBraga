<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161B22;stop-opacity:1" />
    </linearGradient>

    <!-- Animated Gradient for Background -->
    <linearGradient id="animatedBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117;stop-opacity:1">
        <animate attributeName="stop-color" values="#0D1117;#161B22;#0D1117" dur="15s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" style="stop-color:#161B22;stop-opacity:1">
        <animate attributeName="stop-color" values="#161B22;#0D1117;#161B22" dur="15s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <!-- Blue Glow Gradient -->
    <radialGradient id="blueGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#58A6FF;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#58A6FF;stop-opacity:0" />
    </radialGradient>

    <!-- Circuit Line Gradient -->
    <linearGradient id="circuitGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#30363D;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#58A6FF;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#30363D;stop-opacity:0.3" />
    </linearGradient>

    <!-- Energy Flow Gradient -->
    <linearGradient id="energyGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58A6FF;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#58A6FF;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#58A6FF;stop-opacity:0" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Soft Glow Filter -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Grid Pattern -->
    <pattern id="gridPattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#30363D" stroke-width="0.5" opacity="0.1" />
    </pattern>

    <!-- Clip Path for Scan Line -->
    <clipPath id="scanClip">
      <rect x="0" y="0" width="1200" height="300" />
    </clipPath>
  </defs>

  <!-- Main Background -->
  <rect width="1200" height="300" fill="url(#animatedBg)" />

  <!-- Tech Grid -->
  <rect width="1200" height="300" fill="url(#gridPattern)" opacity="0.5">
    <animate attributeName="opacity" values="0.3;0.5;0.3" dur="10s" repeatCount="indefinite" />
  </rect>

  <!-- Blue Glow Effects -->
  <ellipse cx="200" cy="150" rx="300" ry="150" fill="url(#blueGlow)" opacity="0.5">
    <animate attributeName="opacity" values="0.3;0.5;0.3" dur="8s" repeatCount="indefinite" />
  </ellipse>
  <ellipse cx="1000" cy="150" rx="300" ry="150" fill="url(#blueGlow)" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.3;0.5" dur="8s" repeatCount="indefinite" />
  </ellipse>

  <!-- Circuit Lines - Top Left -->
  <g opacity="0.4">
    <path d="M 0 0 L 100 0 L 100 50 L 150 50" fill="none" stroke="#30363D" stroke-width="1" />
    <path d="M 0 20 L 80 20 L 80 80 L 120 80" fill="none" stroke="#30363D" stroke-width="1" />
    <path d="M 0 40 L 60 40 L 60 100 L 100 100" fill="none" stroke="#30363D" stroke-width="1" />
    
    <!-- Energy Flow -->
    <path d="M 0 0 L 100 0 L 100 50 L 150 50" fill="none" stroke="url(#energyGradient)" stroke-width="2" filter="url(#glow)">
      <animate attributeName="stroke-dasharray" values="0,300;300,0" dur="4s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- Circuit Lines - Top Right -->
  <g opacity="0.4">
    <path d="M 1200 0 L 1100 0 L 1100 50 L 1050 50" fill="none" stroke="#30363D" stroke-width="1" />
    <path d="M 1200 20 L 1120 20 L 1120 80 L 1080 80" fill="none" stroke="#30363D" stroke-width="1" />
    <path d="M 1200 40 L 1140 40 L 1140 100 L 1100 100" fill="none" stroke="#30363D" stroke-width="1" />
    
    <!-- Energy Flow -->
    <path d="M 1200 0 L 1100 0 L 1100 50 L 1050 50" fill="none" stroke="url(#energyGradient)" stroke-width="2" filter="url(#glow)">
      <animate attributeName="stroke-dasharray" values="0,300;300,0" dur="5s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- Circuit Lines - Bottom Left -->
  <g opacity="0.4">
    <path d="M 0 300 L 100 300 L 100 250 L 150 250" fill="none" stroke="#30363D" stroke-width="1" />
    <path d="M 0 280 L 80 280 L 80 220 L 120 220" fill="none" stroke="#30363D" stroke-width="1" />
    
    <!-- Energy Flow -->
    <path d="M 0 300 L 100 300 L 100 250 L 150 250" fill="none" stroke="url(#energyGradient)" stroke-width="2" filter="url(#glow)">
      <animate attributeName="stroke-dasharray" values="0,300;300,0" dur="4.5s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- Circuit Lines - Bottom Right -->
  <g opacity="0.4">
    <path d="M 1200 300 L 1100 300 L 1100 250 L 1050 250" fill="none" stroke="#30363D" stroke-width="1" />
    <path d="M 1200 280 L 1120 280 L 1120 220 L 1080 220" fill="none" stroke="#30363D" stroke-width="1" />
    
    <!-- Energy Flow -->
    <path d="M 1200 300 L 1100 300 L 1100 250 L 1050 250" fill="none" stroke="url(#energyGradient)" stroke-width="2" filter="url(#glow)">
      <animate attributeName="stroke-dasharray" values="0,300;300,0" dur="5.5s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- Connected Nodes -->
  <g>
    <!-- Top Left Node -->
    <circle cx="100" cy="50" r="4" fill="#58A6FF" filter="url(#glow)">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite" />
      <animate attributeName="r" values="4;5;4" dur="3s" repeatCount="indefinite" />
    </circle>
    <circle cx="150" cy="50" r="3" fill="#58A6FF" opacity="0.7">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2.5s" repeatCount="indefinite" />
    </circle>
    
    <!-- Top Right Node -->
    <circle cx="1100" cy="50" r="4" fill="#58A6FF" filter="url(#glow)">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3.5s" repeatCount="indefinite" />
      <animate attributeName="r" values="4;5;4" dur="3.5s" repeatCount="indefinite" />
    </circle>
    <circle cx="1050" cy="50" r="3" fill="#58A6FF" opacity="0.7">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2.8s" repeatCount="indefinite" />
    </circle>
    
    <!-- Bottom Left Node -->
    <circle cx="100" cy="250" r="4" fill="#58A6FF" filter="url(#glow)">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3.2s" repeatCount="indefinite" />
      <animate attributeName="r" values="4;5;4" dur="3.2s" repeatCount="indefinite" />
    </circle>
    
    <!-- Bottom Right Node -->
    <circle cx="1100" cy="250" r="4" fill="#58A6FF" filter="url(#glow)">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3.8s" repeatCount="indefinite" />
      <animate attributeName="r" values="4;5;4" dur="3.8s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Floating Particles -->
  <g opacity="0.6">
    <circle cx="200" cy="100" r="1.5" fill="#58A6FF">
      <animate attributeName="cy" values="100;80;100" dur="8s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="8s" repeatCount="indefinite" />
    </circle>
    <circle cx="400" cy="200" r="1" fill="#58A6FF">
      <animate attributeName="cy" values="200;180;200" dur="10s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="10s" repeatCount="indefinite" />
    </circle>
    <circle cx="600" cy="150" r="1.5" fill="#58A6FF">
      <animate attributeName="cy" values="150;130;150" dur="9s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="9s" repeatCount="indefinite" />
    </circle>
    <circle cx="800" cy="100" r="1" fill="#58A6FF">
      <animate attributeName="cy" values="100;120;100" dur="11s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="11s" repeatCount="indefinite" />
    </circle>
    <circle cx="1000" cy="200" r="1.5" fill="#58A6FF">
      <animate attributeName="cy" values="200;180;200" dur="8.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="8.5s" repeatCount="indefinite" />
    </circle>
    <circle cx="300" cy="250" r="1" fill="#58A6FF">
      <animate attributeName="cy" values="250;230;250" dur="12s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="12s" repeatCount="indefinite" />
    </circle>
    <circle cx="900" cy="250" r="1" fill="#58A6FF">
      <animate attributeName="cy" values="250;270;250" dur="10.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="10.5s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Small Blinking Dots -->
  <g>
    <circle cx="50" cy="50" r="2" fill="#58A6FF" opacity="0.5">
      <animate attributeName="opacity" values="0;0.8;0" dur="4s" repeatCount="indefinite" />
    </circle>
    <circle cx="1150" cy="50" r="2" fill="#58A6FF" opacity="0.5">
      <animate attributeName="opacity" values="0;0.8;0" dur="5s" repeatCount="indefinite" />
    </circle>
    <circle cx="50" cy="250" r="2" fill="#58A6FF" opacity="0.5">
      <animate attributeName="opacity" values="0;0.8;0" dur="4.5s" repeatCount="indefinite" />
    </circle>
    <circle cx="1150" cy="250" r="2" fill="#58A6FF" opacity="0.5">
      <animate attributeName="opacity" values="0;0.8;0" dur="5.5s" repeatCount="indefinite" />
    </circle>
    <circle cx="200" cy="150" r="1.5" fill="#58A6FF" opacity="0.4">
      <animate attributeName="opacity" values="0;0.6;0" dur="6s" repeatCount="indefinite" />
    </circle>
    <circle cx="1000" cy="150" r="1.5" fill="#58A6FF" opacity="0.4">
      <animate attributeName="opacity" values="0;0.6;0" dur="7s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Scan Line (Very Light) -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#energyGradient)" opacity="0.1" clip-path="url(#scanClip)">
    <animate attributeName="y" values="0;300;0" dur="20s" repeatCount="indefinite" />
  </rect>

  <!-- Name with Fade In -->
  <text x="600" y="130" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="48" font-weight="700" fill="#F0F6FC" filter="url(#softGlow)">
    <animate attributeName="opacity" values="0;1" dur="2s" fill="freeze" />
  Olá, fique a vontade :)
  </text>

  <!-- Subtitle with Fade In -->
  <text x="600" y="175" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="18" font-weight="400" fill="#8B949E">
    <animate attributeName="opacity" values="0;1" dur="2.5s" fill="freeze" />
    Felipe Braga
  </text>
  <text x="600" y="200" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" font-weight="400" fill="#8B949E">
    <animate attributeName="opacity" values="0;1" dur="3s" fill="freeze" />
    Engenharia da computação :3
  </text>

  <!-- Decorative Lines Near Text -->
  <g opacity="0.3">
    <line x1="300" y1="220" x2="450" y2="220" stroke="#58A6FF" stroke-width="1">
      <animate attributeName="opacity" values="0;0.5" dur="3.5s" fill="freeze" />
      <animate attributeName="x2" values="300;450" dur="2s" fill="freeze" />
    </line>
    <line x1="750" y1="220" x2="900" y2="220" stroke="#58A6FF" stroke-width="1">
      <animate attributeName="opacity" values="0;0.5" dur="3.5s" fill="freeze" />
      <animate attributeName="x1" values="900;750" dur="2s" fill="freeze" />
    </line>
  </g>
</svg>
