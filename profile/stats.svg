<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" width="1200" height="540" role="img" aria-labelledby="title desc">
  <title id="title">GitHub Stats</title>
  <desc id="desc">Card com estatísticas principais do GitHub em layout minimalista.</desc>

  <defs>
    <linearGradient id="panelFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161B22" />
      <stop offset="100%" stop-color="#0D1117" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58A6FF" />
      <stop offset="100%" stop-color="#79C0FF" />
    </linearGradient>
    <style>
      text { font-family: 'Segoe UI', Inter, system-ui, sans-serif; }
      .title { fill: #F0F6FC; font-size: 24px; font-weight: 600; text-anchor: middle; }
      .label { fill: #F0F6FC; font-size: 18px; font-weight: 600; }
      .value { fill: #8B949E; font-size: 18px; font-weight: 600; text-anchor: end; }
      .pill-text { fill: #79C0FF; font-size: 14px; font-weight: 700; text-anchor: middle; dominant-baseline: middle; }
      .eyebrow { fill: #79C0FF; font-size: 14px; font-weight: 700; text-anchor: middle; letter-spacing: 1.2px; }
      .headline { fill: #F0F6FC; font-size: 54px; font-weight: 700; text-anchor: middle; }
      .subtitle { fill: #8B949E; font-size: 20px; font-weight: 500; text-anchor: middle; }
      .body { fill: #8B949E; font-size: 16px; font-weight: 400; text-anchor: middle; }
      .chip-text { fill: #F0F6FC; font-size: 15px; font-weight: 600; text-anchor: middle; dominant-baseline: middle; }
    </style>
    
  </defs>

  <rect width="1200" height="540" rx="28" fill="#0D1117" />
  <rect x="14" y="14" width="1172" height="512" rx="26" fill="url(#panelFill)" stroke="#30363D" stroke-width="2" />
  <rect x="34" y="34" width="1132" height="472" rx="22" fill="none" stroke="#21262D" stroke-width="1" />
  <text x="600" y="84" class="title">GitHub Stats</text>
  <line x1="520" y1="100" x2="680" y2="100" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" opacity="0.9" />
  <g>

    <g transform="translate(72 132)">
      <animateTransform attributeName="transform" type="translate" values="72 140;72 132" dur="0.42s" fill="freeze" />
      <animate attributeName="opacity" values="0;1" dur="0.42s" fill="freeze" />
      <rect width="1056" height="56" rx="16" fill="#0D1117" stroke="#21262D" stroke-width="2" />
      <rect x="18" y="13" width="94" height="30" rx="15" fill="#161B22" stroke="#30363D" stroke-width="1.5" />
      <text x="65" y="28" class="pill-text">REPO</text>
      <text x="136" y="28" class="label">Repositories</text>
      <text x="1020" y="28" class="value">15</text>
      <rect x="520" y="23" width="430" height="10" rx="5" fill="#21262D" />
      <rect x="520" y="23" width="0" height="10" rx="5" fill="url(#accent)">
        <animate attributeName="width" values="0;430.0" dur="0.85s" begin="0.12s" fill="freeze" />
      </rect>
      <rect x="520" y="23" width="430" height="10" rx="5" fill="none" stroke="#30363D" stroke-width="1" />
    </g>
    <g transform="translate(72 202)">
      <animateTransform attributeName="transform" type="translate" values="72 210;72 202" dur="0.47s" fill="freeze" />
      <animate attributeName="opacity" values="0;1" dur="0.47s" fill="freeze" />
      <rect width="1056" height="56" rx="16" fill="#0D1117" stroke="#21262D" stroke-width="2" />
      <rect x="18" y="13" width="94" height="30" rx="15" fill="#161B22" stroke="#30363D" stroke-width="1.5" />
      <text x="65" y="28" class="pill-text">SOCIAL</text>
      <text x="136" y="28" class="label">Followers</text>
      <text x="1020" y="28" class="value">2</text>
      <rect x="520" y="23" width="430" height="10" rx="5" fill="#21262D" />
      <rect x="520" y="23" width="0" height="10" rx="5" fill="url(#accent)">
        <animate attributeName="width" values="0;57.3" dur="0.85s" begin="0.20s" fill="freeze" />
      </rect>
      <rect x="520" y="23" width="430" height="10" rx="5" fill="none" stroke="#30363D" stroke-width="1" />
    </g>
    <g transform="translate(72 272)">
      <animateTransform attributeName="transform" type="translate" values="72 280;72 272" dur="0.52s" fill="freeze" />
      <animate attributeName="opacity" values="0;1" dur="0.52s" fill="freeze" />
      <rect width="1056" height="56" rx="16" fill="#0D1117" stroke="#21262D" stroke-width="2" />
      <rect x="18" y="13" width="94" height="30" rx="15" fill="#161B22" stroke="#30363D" stroke-width="1.5" />
      <text x="65" y="28" class="pill-text">NETWORK</text>
      <text x="136" y="28" class="label">Following</text>
      <text x="1020" y="28" class="value">6</text>
      <rect x="520" y="23" width="430" height="10" rx="5" fill="#21262D" />
      <rect x="520" y="23" width="0" height="10" rx="5" fill="url(#accent)">
        <animate attributeName="width" values="0;172.0" dur="0.85s" begin="0.28s" fill="freeze" />
      </rect>
      <rect x="520" y="23" width="430" height="10" rx="5" fill="none" stroke="#30363D" stroke-width="1" />
    </g>
    <g transform="translate(72 342)">
      <animateTransform attributeName="transform" type="translate" values="72 350;72 342" dur="0.57s" fill="freeze" />
      <animate attributeName="opacity" values="0;1" dur="0.57s" fill="freeze" />
      <rect width="1056" height="56" rx="16" fill="#0D1117" stroke="#21262D" stroke-width="2" />
      <rect x="18" y="13" width="94" height="30" rx="15" fill="#161B22" stroke="#30363D" stroke-width="1.5" />
      <text x="65" y="28" class="pill-text">STARS</text>
      <text x="136" y="28" class="label">Stars</text>
      <text x="1020" y="28" class="value">2</text>
      <rect x="520" y="23" width="430" height="10" rx="5" fill="#21262D" />
      <rect x="520" y="23" width="0" height="10" rx="5" fill="url(#accent)">
        <animate attributeName="width" values="0;57.3" dur="0.85s" begin="0.36s" fill="freeze" />
      </rect>
      <rect x="520" y="23" width="430" height="10" rx="5" fill="none" stroke="#30363D" stroke-width="1" />
    </g>
    <g transform="translate(72 412)">
      <animateTransform attributeName="transform" type="translate" values="72 420;72 412" dur="0.62s" fill="freeze" />
      <animate attributeName="opacity" values="0;1" dur="0.62s" fill="freeze" />
      <rect width="1056" height="56" rx="16" fill="#0D1117" stroke="#21262D" stroke-width="2" />
      <rect x="18" y="13" width="94" height="30" rx="15" fill="#161B22" stroke="#30363D" stroke-width="1.5" />
      <text x="65" y="28" class="pill-text">FORKS</text>
      <text x="136" y="28" class="label">Forks</text>
      <text x="1020" y="28" class="value">0</text>
      <rect x="520" y="23" width="430" height="10" rx="5" fill="#21262D" />
      <rect x="520" y="23" width="0" height="10" rx="5" fill="url(#accent)">
        <animate attributeName="width" values="0;0.0" dur="0.85s" begin="0.44s" fill="freeze" />
      </rect>
      <rect x="520" y="23" width="430" height="10" rx="5" fill="none" stroke="#30363D" stroke-width="1" />
    </g>
  </g>

  <g transform="translate(1100 474)" shape-rendering="crispEdges" opacity="0.72">
    <g transform="translate(0 14)">
      <animateTransform attributeName="transform" type="rotate" values="0 4 6;10 4 6;0 4 6;-6 4 6;0 4 6" dur="7s" repeatCount="indefinite" />
      <rect x="0" y="8" width="4" height="4" fill="#30363D" />
      <rect x="4" y="4" width="4" height="4" fill="#30363D" />
      <rect x="8" y="0" width="4" height="4" fill="#30363D" />
      <rect x="8" y="4" width="4" height="4" fill="#30363D" />
      <rect x="8" y="8" width="4" height="4" fill="#30363D" />
    </g>
    <g>
      <rect x="12" y="0" width="4" height="4" fill="#30363D" />
      <rect x="24" y="0" width="4" height="4" fill="#30363D" />
      <rect x="8" y="4" width="4" height="4" fill="#30363D" />
      <rect x="12" y="4" width="4" height="4" fill="#30363D" />
      <rect x="16" y="4" width="4" height="4" fill="#30363D" />
      <rect x="20" y="4" width="4" height="4" fill="#30363D" />
      <rect x="24" y="4" width="4" height="4" fill="#30363D" />
      <rect x="28" y="4" width="4" height="4" fill="#30363D" />
      <rect x="8" y="8" width="4" height="4" fill="#30363D" />
      <rect x="12" y="8" width="4" height="4" fill="#30363D" />
      <rect x="16" y="8" width="4" height="4" fill="#30363D" />
      <rect x="20" y="8" width="4" height="4" fill="#30363D" />
      <rect x="24" y="8" width="4" height="4" fill="#30363D" />
      <rect x="28" y="8" width="4" height="4" fill="#30363D" />
      <rect x="8" y="12" width="4" height="4" fill="#30363D" />
      <rect x="12" y="12" width="4" height="4" fill="#30363D" />
      <rect x="16" y="12" width="4" height="4" fill="#30363D" />
      <rect x="20" y="12" width="4" height="4" fill="#30363D" />
      <rect x="24" y="12" width="4" height="4" fill="#30363D" />
      <rect x="28" y="12" width="4" height="4" fill="#30363D" />
      <rect x="12" y="16" width="4" height="4" fill="#30363D" />
      <rect x="16" y="16" width="4" height="4" fill="#30363D" />
      <rect x="20" y="16" width="4" height="4" fill="#30363D" />
      <rect x="24" y="16" width="4" height="4" fill="#30363D" />
      <rect x="12" y="20" width="4" height="4" fill="#30363D" />
      <rect x="16" y="20" width="4" height="4" fill="#30363D" />
      <rect x="20" y="20" width="4" height="4" fill="#30363D" />
      <rect x="24" y="20" width="4" height="4" fill="#30363D" />
      <rect x="12" y="24" width="4" height="4" fill="#30363D" />
      <rect x="24" y="24" width="4" height="4" fill="#30363D" />
      <rect x="12" y="28" width="4" height="4" fill="#30363D" />
      <rect x="24" y="28" width="4" height="4" fill="#30363D" />
    </g>
    <g fill="#F0F6FC">
      <rect x="16" y="12" width="4" height="4">
        <animate attributeName="opacity" values="1;1;1;0;1;1" dur="6.5s" repeatCount="indefinite" />
      </rect>
      <rect x="24" y="12" width="4" height="4">
        <animate attributeName="opacity" values="1;1;1;0;1;1" dur="6.5s" repeatCount="indefinite" />
      </rect>
    </g>
  </g>
</svg>
