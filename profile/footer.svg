<svg width="900" height="90" viewBox="0 0 900 90" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#30363D"/>
      <stop offset="50%" stop-color="#58A6FF"/>
      <stop offset="100%" stop-color="#30363D"/>
    </linearGradient>

    <linearGradient id="node" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#58A6FF"/>
      <stop offset="100%" stop-color="#7DD3FC"/>
    </linearGradient>
  </defs>

  <!-- Main line -->
  <line
      x1="80"
      y1="45"
      x2="820"
      y2="45"
      stroke="url(#line)"
      stroke-width="1.2"/>

  <!-- LEFT -->
  <g stroke="#30363D" stroke-width="1.2" fill="none">

      <path d="M80 45 H120 V25 H160"/>

      <path d="M120 45 V65 H170"/>

      <path d="M170 65 V45 H210"/>

      <path d="M160 25 V12"/>

      <circle cx="120" cy="45" r="3" fill="url(#node)"/>
      <circle cx="160" cy="25" r="3" fill="url(#node)"/>
      <circle cx="170" cy="65" r="3" fill="url(#node)"/>
      <circle cx="210" cy="45" r="3" fill="url(#node)"/>

  </g>

  <!-- CENTER -->
  <circle cx="450" cy="45" r="4" fill="#58A6FF"/>

  <circle cx="435" cy="45" r="1.5" fill="#58A6FF"/>
  <circle cx="465" cy="45" r="1.5" fill="#58A6FF"/>

  <!-- RIGHT -->
  <g stroke="#30363D" stroke-width="1.2" fill="none">

      <path d="M820 45 H780 V25 H740"/>

      <path d="M780 45 V65 H730"/>

      <path d="M730 65 V45 H690"/>

      <path d="M740 25 V12"/>

      <circle cx="780" cy="45" r="3" fill="url(#node)"/>
      <circle cx="740" cy="25" r="3" fill="url(#node)"/>
      <circle cx="730" cy="65" r="3" fill="url(#node)"/>
      <circle cx="690" cy="45" r="3" fill="url(#node)"/>

  </g>

  <!-- Decorative -->
  <circle cx="280" cy="45" r="1.4" fill="#58A6FF" opacity=".5"/>
  <circle cx="620" cy="45" r="1.4" fill="#58A6FF" opacity=".5"/>

</svg>
